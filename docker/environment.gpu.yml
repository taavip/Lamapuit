name: cwd-detect
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10

  # Core scientific computing
  - numpy=1.26.*
  - scipy=1.12.*
  - pandas=2.2.*

  # Geospatial libraries (pinned to reduce solve-time branching)
  - geopandas=0.14.*
  - rasterio=1.3.*
  - shapely=2.0.*
  - pyproj=3.6.*
  - gdal=3.8.*
  - fiona=1.9.*

  # LiDAR processing
  - pdal>=2.6,<2.8
  - laspy=2.5.*

  # ML stack (explicit CUDA-enabled torch)
  - pytorch=2.2.*
  - torchvision=0.17.*
  - pytorch-cuda=12.1
  - scikit-learn=1.4.*
  - scikit-image=0.22.*

  # Testing and utilities
  - pytest=8.*
  - pytest-cov=5.*
  - pytest-mock=3.14.*
  - tqdm=4.66.*
  - pyyaml=6.0.*
  - matplotlib=3.8.*
  - seaborn=0.13.*
  - pillow>=9,<11
  - requests=2.32.*
  - beautifulsoup4=4.12.*
  - urllib3=2.2.*
  - pip
